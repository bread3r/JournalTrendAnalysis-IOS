workflows:
  ios-build:
    name: iOS Build IPA (AltStore)

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Clean iOS pods (safe)
        script: |
          cd ios
          rm -rf Pods Podfile.lock || true
          cd ..

      - name: Build IPA
        script: |
          flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa